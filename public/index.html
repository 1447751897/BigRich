<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#1b3b6f" />
  <title>环游都市 · BigRich</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-anim="full">
  <!-- 顶部状态条:房间码 / 连接 / 静音音量 / 动画档位 -->
  <header class="topbar">
    <div class="brand">🏙️ 环游都市</div>
    <div class="status">
      <span id="roomChip" class="chip hidden">房间 <b id="roomCode"></b></span>
      <span id="conn" class="chip">连接中…</span>
      <button id="muteBtn" class="icon" title="静音/取消静音">🔊</button>
      <input id="volume" class="vol" type="range" min="0" max="100" value="60" title="音量" />
      <select id="animSel" class="sel" title="动画档位">
        <option value="full">动画·完整</option>
        <option value="lite">动画·精简</option>
        <option value="off">动画·关闭</option>
      </select>
    </div>
  </header>

  <main>
    <!-- 进房 -->
    <section id="entry" class="screen center">
      <div class="card">
        <h2>🏙️ 环游都市</h2>
        <p class="sub">买地 · 盖楼 · 收租，约 20–30 分钟一局，点链接就玩。</p>
        <label class="fld">昵称<input id="nickname" maxlength="16" placeholder="输入昵称即可玩" /></label>
        <button id="btnCreate" class="big">创建房间</button>
        <div class="orline"><span>或加入好友房间</span></div>
        <div class="joinrow">
          <input id="joinCode" maxlength="4" placeholder="房间码" />
          <button id="btnJoin" class="ghost">加入</button>
        </div>
        <p id="entryErr" class="err"></p>
      </div>
    </section>

    <!-- 大厅 -->
    <section id="lobby" class="screen center hidden">
      <div class="card">
        <h2>房间 <span id="lobbyCode" class="code"></span></h2>
        <p class="sub">把房间码或链接发给朋友，2–8 人即可开局。</p>
        <div id="lobbyLink" class="link"></div>
        <ul id="seatList" class="seatlist"></ul>
        <button id="btnStart" class="big hidden">开始游戏</button>
        <p class="hint" id="startHint"></p>
      </div>
    </section>

    <!-- 对局 -->
    <section id="game" class="screen hidden">
      <div id="avatars" class="avatars"></div>

      <div class="stage">
        <div class="board-wrap" id="boardWrap">
          <div id="board" class="board"></div>
          <div id="pawnLayer" class="pawn-layer"></div>
          <div class="hub" id="hub">
            <div class="hub-city">🏙️🌆</div>
            <div id="turnInfo" class="turn-info">—</div>
            <div class="dice" id="dice">
              <span class="die" id="die0" data-v="1"></span>
              <span class="die" id="die1" data-v="1"></span>
            </div>
            <div id="countdown" class="countdown hidden"></div>
          </div>
        </div>
      </div>

      <aside class="sidebar">
        <div id="players" class="players"></div>
        <details id="logBox" class="logbox">
          <summary>事件日志</summary>
          <div id="log" class="log"></div>
        </details>
      </aside>

      <!-- 底部固定操作条(手机)/ 侧栏内联(桌面) -->
      <div id="actionBar" class="action-bar"></div>

      <!-- 强交互弹层:交易 / 拍卖 / 地产管理 -->
      <div id="sheet" class="sheet hidden">
        <div class="sheet-backdrop" id="sheetBackdrop"></div>
        <div class="sheet-card">
          <div class="sheet-head"><span id="sheetTitle">面板</span><button id="sheetClose" class="icon">×</button></div>
          <div id="sheetBody" class="sheet-body"></div>
        </div>
      </div>
    </section>

    <div id="result" class="result hidden"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
